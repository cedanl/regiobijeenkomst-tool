# Fly.io deployment voor cedanl/regiobijeenkomst-tool
# Setup eenmalig (`fly launch` is interactief — accepteer de app-naam en
# regio uit dit bestand of overschrijf naar wens). Draai alle commando's
# vanaf de repo-root:
#   1. fly auth login
#   2. fly launch --copy-config --no-deploy --config docker/fly.toml
#   3. fly volumes create recaps --region ams --size 1 --config docker/fly.toml
#   4. fly deploy --config docker/fly.toml
# Daarna: nieuwe builds via `fly deploy --config docker/fly.toml`.
#
# Recaps ophalen voor analyse:
#   fly ssh console -C "tar -C /data/recaps -czf - ." > recaps.tgz
#
# Let op: rooms zijn in-memory. min_machines_running = 1 voorkomt dat Fly de
# VM stopt tijdens stillere momenten in een bijeenkomst (waardoor alle live
# sessies zouden droppen). Voor zuinigheid kun je 'm op 0 zetten ná elke
# bijeenkomst, en weer op 1 vóór de volgende.

app = "ceda-regiobijeenkomst"
primary_region = "ams"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  NODE_ENV = "production"
  RECAP_DIR = "/data/recaps"

[[mounts]]
  source = "recaps"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
