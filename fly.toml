# Fly.io deployment voor cedanl/regiobijeenkomst-tool
# Setup eenmalig:
#   1. fly auth login
#   2. fly launch --copy-config --no-deploy        # neemt deze fly.toml over
#   3. fly volumes create recaps --region ams --size 1   # 1 GB persistent
#   4. fly deploy
# Daarna: nieuwe builds via `fly deploy`.
#
# Recaps ophalen voor analyse:
#   fly ssh sftp shell        # interactief
#   # of:
#   fly ssh console -C "tar -C /data/recaps -czf - ." > recaps.tgz

app = "ceda-regiobijeenkomst"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  RECAP_DIR = "/data/recaps"

[[mounts]]
  source = "recaps"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
