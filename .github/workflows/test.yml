# Draait de Playwright-regressietest op elke PR en na elke push naar main.
# Dit is het structurele vangnet voor wat in mei misging: een file-swap die
# /api/recap onbedoeld dropte uit de frontend, onopgemerkt naar productie.
# Lokale `npm test` als preflight vóór `fly deploy` blijft de aanrader,
# maar dit voorkomt dat het van menselijke discipline afhangt.

name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test
